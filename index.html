<!DOCTYPE html>
<html>
<head>
    <title>Simple Calculator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 400px;
            margin: 50px auto;
            padding: 20px;
            background: #f4f4f4;
            border-radius: 10px;
        }
        h2 { text-align: center; color: #333; }
        input, select, button {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            box-sizing: border-box;
        }
        button {
            background: #007bff;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background: #0056b3; }
        .result {
            background: white;
            padding: 15px;
            border-radius: 5px;
            text-align: center;
            font-size: 20px;
            margin-top: 15px;
            border: 2px solid #28a745;
        }
        .error { border-color: #dc3545; color: #dc3545; }
    </style>
</head>
<body>
    <h2>🧮 Simple Calculator</h2>
    <input type="number" id="num1" placeholder="Enter first number" step="any">
    <input type="number" id="num2" placeholder="Enter second number" step="any">
    <select id="operation">
        <option value="add">➕ Addition (+)</option>
        <option value="subtract">➖ Subtraction (-)</option>
        <option value="multiply">✖️ Multiplication (×)</option>
        <option value="divide">➗ Division (÷)</option>
    </select>
    <button onclick="calculate()">Calculate</button>
    <div id="result" class="result">Ready to calculate...</div>

    <script>
        function calculate() {
            const num1 = parseFloat(document.getElementById('num1').value);
            const num2 = parseFloat(document.getElementById('num2').value);
            const op = document.getElementById('operation').value;
            const resultDiv = document.getElementById('result');
            
            if (isNaN(num1) || isNaN(num2)) {
                resultDiv.className = 'result error';
                resultDiv.textContent = '❌ Please enter valid numbers!';
                return;
            }

            let result, symbol;
            switch(op) {
                case 'add': result = num1 + num2; symbol = '+'; break;
                case 'subtract': result = num1 - num2; symbol = '-'; break;
                case 'multiply': result = num1 * num2; symbol = '×'; break;
                case 'divide':
                    if (num2 === 0) {
                        resultDiv.className = 'result error';
                        resultDiv.textContent = '❌ Error: Division by zero!';
                        return;
                    }
                    result = num1 / num2; symbol = '÷'; break;
            }
            
            resultDiv.className = 'result';
            resultDiv.textContent = `${num1} ${symbol} ${num2} = ${result}`;
        }
    </script>
</body>
</html>
